<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>GOAT</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
:root {
  --beige:#E8E4D9;--beige2:#F0EDE5;--beige3:#D9D4C7;
  --lime:#C8F135;--lime-d:#8FB800;
  --black:#0A0A0A;--offblack:#1A1A1A;
  --white:#FFFFFF;--off-white:#FAFAF8;
  --gray:#F2F2F0;--gray2:#E8E8E4;--gray3:#9B9B94;
  --kpi1:#7A6E5F;--kpi2:#4A5568;--kpi3:#E8E0CC;--kpi4:#C05A2C;
  --text:#0A0A0A;--muted:#6B6B62;--hint:#ABABAA;
  --r:20px;--rs:14px;--rb:40px;
  --font-display:'Instrument Serif',Georgia,serif;
  --font-body:'DM Sans',-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-body);background:var(--beige);color:var(--text);font-size:14px;min-height:100vh;overflow-x:hidden}
.hidden{display:none!important}
input,select,textarea,button{font-family:var(--font-body)}

/* ── LOGIN ── */
#ls{min-height:100vh;background:var(--beige);display:flex;flex-direction:column;padding:32px 24px 40px}
.ls-logo{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:48px}
.ls-logo span{font-weight:300}
.ls-heading{font-family:var(--font-display);font-size:38px;line-height:1.1;margin-bottom:6px;color:var(--offblack)}
.ls-sub{font-size:15px;color:var(--muted);margin-bottom:36px;font-weight:400}
.role-section{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.rg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.rg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.rb{background:var(--white);border-radius:var(--r);border:1.5px solid transparent;padding:16px 12px 14px;cursor:pointer;text-align:left;transition:all .18s;position:relative;overflow:hidden}
.rb:hover{border-color:var(--lime-d);background:var(--off-white)}
.rb.sel{border-color:var(--black);background:var(--white)}
.rb.sel::after{content:'';position:absolute;top:10px;right:10px;width:10px;height:10px;border-radius:50%;background:var(--black)}
.rb .ri{font-size:36px;margin-bottom:10px;display:block;line-height:1}
.rb .rn{font-size:13px;font-weight:600;color:var(--offblack);display:block}
.rb .rt{font-size:11px;color:var(--muted);margin-top:1px;display:block}
.rb-owner{background:var(--white);border-radius:var(--r);border:1.5px solid transparent;padding:18px 20px;cursor:pointer;display:flex;align-items:center;gap:16px;transition:all .18s;margin-bottom:10px;width:100%;text-align:left}
.rb-owner:hover{border-color:var(--lime-d)}
.rb-owner.sel{border-color:var(--black)}
.rb-owner .ri{font-size:40px;flex-shrink:0}
.rb-owner .rn{font-size:14px;font-weight:600;color:var(--offblack)}
.rb-owner .rt{font-size:12px;color:var(--muted);margin-top:2px}
.ls-spacer{flex:1}
.lbtn{width:100%;padding:18px;background:var(--black);color:var(--white);border:none;border-radius:var(--rb);font-size:16px;font-weight:500;cursor:pointer;letter-spacing:-.2px;transition:opacity .15s;font-family:var(--font-body)}
.lbtn:disabled{opacity:.3;cursor:not-allowed}
.lbtn:not(:disabled):hover{opacity:.85}

/* ── APP ── */
#app{display:none;flex-direction:column;min-height:100vh;max-width:430px;margin:0 auto;background:var(--white);position:relative}

/* TOPBAR */
.tb{background:var(--white);padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.tb-ham{width:36px;height:36px;display:flex;flex-direction:column;justify-content:center;gap:5px;cursor:pointer;padding:4px}
.tb-ham span{display:block;height:2px;background:var(--black);border-radius:2px;transition:all .2s}
.tb-ham span:first-child{width:24px}
.tb-ham span:last-child{width:16px}
.lo-btn{background:var(--white);border:1.5px solid var(--offblack);border-radius:var(--rb);padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;color:var(--offblack);flex-shrink:0;display:block!important;opacity:1!important;visibility:visible!important}
.lo-btn:hover{background:var(--gray)}

/* SIDEBAR */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s}
.sidebar-overlay.open{opacity:1;pointer-events:all}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:72%;max-width:280px;background:var(--gray);z-index:400;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);padding:60px 28px 40px;display:flex;flex-direction:column}
.sidebar.open{transform:translateX(0)}
.sb-nav{display:flex;flex-direction:column;gap:4px;flex:1}
.sb-item{padding:14px 16px;border-radius:var(--rs);font-size:16px;font-weight:500;color:var(--offblack);cursor:pointer;transition:background .15s;border:none;background:transparent;text-align:left;font-family:var(--font-body);width:100%}
.sb-item:hover{background:var(--gray2)}
.sb-item.active{background:var(--black);color:var(--white)}
.sb-role{margin-top:auto;padding-top:24px;border-top:1px solid var(--gray2)}
.sb-role-name{font-size:13px;font-weight:600;color:var(--offblack)}
.sb-role-title{font-size:11px;color:var(--muted);margin-top:2px}

/* MAIN CONTENT */
.mc{flex:1;padding:0 20px 100px;overflow-y:auto}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--white);border-top:1px solid var(--gray2);padding:12px 0 20px;z-index:100}
.ntabs{display:flex;justify-content:space-around}
.ntab{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding:2px 16px;border:none;background:transparent;font-family:var(--font-body)}
.ntab .ni{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:19px;transition:background .15s}
.ntab.active .ni{background:var(--black)}
.ntab .nl{font-size:10px;color:var(--hint);font-weight:500}
.ntab.active .nl{color:var(--offblack);font-weight:600}

/* HOME */
.home-greeting{padding:20px 0 24px;display:flex;align-items:flex-start;justify-content:space-between}
.greeting-text .hi{font-size:13px;color:var(--muted);margin-bottom:4px}
.greeting-text h1{font-family:var(--font-display);font-size:32px;line-height:1.1;color:var(--offblack)}
.role-badge{display:inline-block;background:var(--lime);color:var(--offblack);border-radius:var(--rb);padding:6px 14px;font-size:12px;font-weight:600;margin-top:10px}
.avatar{width:60px;height:60px;border-radius:50%;background:var(--gray2);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;border:2px solid var(--gray2)}

/* KPI FILTER TABS */
.filter-tabs{display:flex;gap:8px;margin:4px 0 16px}
.ftab{padding:8px 16px;border-radius:var(--rb);font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:var(--font-body);transition:all .15s}
.ftab.active{background:var(--lime);color:var(--offblack)}
.ftab:not(.active){background:var(--gray);color:var(--muted)}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
.kpi-card{border-radius:var(--r);padding:18px;min-height:140px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;transition:transform .15s;overflow:hidden;position:relative}
.kpi-card:active{transform:scale(.98)}
.kpi-card .kl{font-size:12px;font-weight:500;color:rgba(255,255,255,.75);line-height:1.3}
.kpi-card .kl.dark{color:rgba(0,0,0,.55)}
.kpi-card .kv{font-family:var(--font-display);font-size:42px;line-height:1;font-weight:400}
.kpi-card .ku{font-size:12px;opacity:.7;font-weight:400}
.kpi1{background:var(--kpi1)}.kpi1 .kv{color:var(--white)}
.kpi2{background:var(--kpi2)}.kpi2 .kv{color:var(--white)}
.kpi3{background:var(--kpi3)}.kpi3 .kv{color:var(--offblack)}.kpi3 .kl{color:rgba(0,0,0,.55)!important}
.kpi4{background:var(--kpi4)}.kpi4 .kv{color:var(--white)}

/* SECTION TITLE */
.stl{font-size:16px;font-weight:600;margin:0 0 14px;color:var(--offblack);display:flex;align-items:center;justify-content:space-between}
.stl a{font-size:12px;color:var(--muted);font-weight:400}

/* QUICK ACCESS */
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:28px}
.qa-btn{background:var(--gray);border-radius:var(--r);padding:16px 8px 14px;cursor:pointer;text-align:center;border:none;font-family:var(--font-body);transition:all .15s}
.qa-btn:hover{background:var(--gray2)}
.qa-btn:active{transform:scale(.96)}
.qa-btn .qi{font-size:24px;margin-bottom:8px;display:block}
.qa-btn .ql{font-size:10px;font-weight:500;color:var(--offblack)}

/* MENU LIST */
.mcard{background:var(--white);border-radius:var(--r);border:1px solid var(--gray2);overflow:hidden;margin-bottom:10px}
.mi{display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--gray2);transition:background .1s;border:none;background:var(--white);width:100%;text-align:left;font-family:var(--font-body)}
.mi:last-child{border-bottom:none}
.mi:active{background:var(--gray)}
.mi .iw{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.mi .inf{flex:1;min-width:0}
.mi .inf .mn{font-size:14px;font-weight:500;color:var(--offblack)}
.mi .inf .md{font-size:11px;color:var(--muted);margin-top:2px}
.mi .mbg{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;flex-shrink:0;background:var(--gray);color:var(--muted)}
.chv{color:var(--hint);font-size:18px;margin-left:4px}

/* FORMS */
.page-header{padding:20px 0 16px}
.page-header h2{font-family:var(--font-display);font-size:28px;color:var(--offblack)}
.page-header p{font-size:13px;color:var(--muted);margin-top:4px}
.fs{background:var(--white);border-radius:var(--r);border:1px solid var(--gray2);overflow:hidden;margin-bottom:14px}
.fst{padding:11px 16px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--gray2);background:var(--gray)}
.fi{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--gray2);gap:10px}
.fi:last-child{border-bottom:none}
.fi label{font-size:12px;color:var(--muted);flex-shrink:0;width:100px}
.fi input,.fi select,.fi textarea{flex:1;border:none;background:transparent;font-size:14px;color:var(--offblack);font-family:var(--font-body);outline:none;min-width:0}
.fi textarea{resize:none;height:72px;padding-top:2px}
.fi select{-webkit-appearance:none;cursor:pointer}
.av{flex:1;font-size:14px;font-weight:600}
.av.gn{color:#2D6A2D}.av.bl{color:#1E3A8A}.av.or{color:#92400E}.av.rd{color:#991B1B}
.pf{padding:13px 16px;border-bottom:1px solid var(--gray2)}
.pf:last-child{border-bottom:none}
.pbtn{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--gray);border:1.5px dashed var(--gray3);border-radius:var(--rs);cursor:pointer}
.pbtn span{font-size:12px;color:var(--muted);font-weight:500}
.sbtn{width:100%;padding:16px;border:none;border-radius:var(--rb);font-size:15px;font-weight:500;cursor:pointer;margin-top:6px;font-family:var(--font-body);transition:opacity .15s;letter-spacing:-.2px}
.sbtn:active{opacity:.8}
.sbtn.black{background:var(--black);color:var(--white)}
.sbtn.lime{background:var(--lime);color:var(--offblack)}
.sbtn.gray{background:var(--gray2);color:var(--offblack)}
.sbtn.danger{background:#991B1B;color:var(--white)}

/* TAG PICKER */
.tpick{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.tag{font-size:12px;padding:5px 12px;border-radius:var(--rb);cursor:pointer;font-weight:500;border:1.5px solid var(--gray2);background:var(--white);color:var(--muted);transition:all .1s}
.tag.act{border-color:var(--black);background:var(--black);color:var(--white)}

/* STARS */
.star{font-size:22px;cursor:pointer;opacity:.2;transition:opacity .1s;line-height:1}
.star.act{opacity:1}
.spick{display:flex;gap:3px;flex:1}

/* INFO BOX */
.ibox{border-radius:var(--rs);padding:11px 14px;margin-bottom:14px;font-size:12px;line-height:1.6;font-weight:500}
.ibox.gn{background:#F0FDF4;border:1px solid #BBF7D0;color:#166534}
.ibox.or{background:#FFF7ED;border:1px solid #FED7AA;color:#92400E}
.ibox.bl{background:#EFF6FF;border:1px solid #BFDBFE;color:#1E40AF}
.ibox.pu{background:#F5F3FF;border:1px solid #DDD6FE;color:#5B21B6}
.ibox.pk{background:#FDF2F8;border:1px solid #FBCFE8;color:#9D174D}

/* INGREDIENT PICKER */
.is{width:100%;padding:11px 14px;border:1.5px solid var(--gray2);border-radius:var(--rs);font-size:13px;font-family:var(--font-body);background:var(--white);color:var(--offblack);outline:none;margin-bottom:8px}
.is:focus{border-color:var(--black)}
.il{max-height:190px;overflow-y:auto;border:1.5px solid var(--gray2);border-radius:var(--rs)}
.io{padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--gray2);font-size:13px;display:flex;justify-content:space-between;align-items:center;transition:background .1s}
.io:last-child{border-bottom:none}
.io:hover{background:var(--gray)}
.io.sel{background:var(--lime);color:var(--offblack)}
.io .in{font-weight:500}
.io .im{font-size:10px;color:var(--muted)}
.io.sel .im{color:var(--offblack)}
.ichips{margin-top:8px;display:flex;flex-wrap:wrap;gap:5px}
.ich{display:flex;align-items:center;gap:4px;background:var(--black);color:var(--white);border-radius:var(--rb);padding:4px 10px;font-size:11px;font-weight:500}
.ich .xr{cursor:pointer;font-size:13px;opacity:.7}

/* RECIPE STEPS */
.stlist{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.stitem{display:flex;gap:8px;align-items:flex-start}
.stnum{width:26px;height:26px;border-radius:50%;background:var(--black);color:var(--white);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:3px}
.stin{flex:1;padding:10px 13px;border:1.5px solid var(--gray2);border-radius:var(--rs);font-size:13px;font-family:var(--font-body);color:var(--offblack);outline:none;background:var(--white)}
.stin:focus{border-color:var(--black)}
.stdel{width:26px;height:26px;border:none;background:var(--gray2);color:var(--muted);border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:3px;font-family:var(--font-body)}
.add-step{display:flex;align-items:center;gap:8px;padding:10px 13px;background:var(--gray);border:1.5px dashed var(--gray3);border-radius:var(--rs);cursor:pointer;font-size:12px;color:var(--muted);font-family:var(--font-body);width:100%;font-weight:500}

/* ENTRY CARDS */
.ec{background:var(--white);border-radius:var(--rs);border:1px solid var(--gray2);padding:14px 15px;margin-bottom:8px;position:relative}
.et{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px}
.etitle{font-size:14px;font-weight:500;flex:1;margin-right:8px;color:var(--offblack)}
.edate{font-size:11px;color:var(--hint)}
.esub{font-size:12px;color:var(--muted);margin-top:2px}
.edel{position:absolute;bottom:12px;right:12px;background:var(--gray);color:var(--muted);border:none;border-radius:var(--rb);padding:5px 10px;cursor:pointer;font-size:11px;font-weight:500;font-family:var(--font-body)}
.pill{display:inline-block;font-size:10px;padding:3px 9px;border-radius:var(--rb);font-weight:600}
.pill.gn{background:#DCFCE7;color:#166534}
.pill.or{background:#FFEDD5;color:#9A3412}
.pill.pu{background:#EDE9FE;color:#5B21B6}
.pill.rd{background:#FEE2E2;color:#991B1B}
.pill.pk{background:#FCE7F3;color:#9D174D}
.pill.bl{background:#DBEAFE;color:#1E40AF}
.pill.am{background:#FEF3C7;color:#92400E}
.pill.te{background:#CCFBF1;color:#134E4A}
.pill.cy{background:#CFFAFE;color:#164E63}

/* RECIPE VIEW */
.recipe-view{background:var(--white);border-radius:var(--r);border:1px solid var(--gray2);padding:18px;margin-bottom:12px}
.rv-dish{font-family:var(--font-display);font-size:22px;color:var(--offblack);margin-bottom:4px}
.rv-sec{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 6px}
.rv-ing-chip{display:inline-block;background:var(--gray);color:var(--offblack);border-radius:var(--rb);padding:4px 10px;font-size:11px;font-weight:500;margin:2px 3px 2px 0}
.rv-step{display:flex;gap:10px;margin-bottom:8px;font-size:13px;color:var(--offblack);line-height:1.5}
.rv-snum{width:22px;height:22px;border-radius:50%;background:var(--offblack);color:var(--white);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}

/* CARBON */
.scope-card{border-radius:var(--r);padding:16px;margin-bottom:10px;border:none}
.prog{height:4px;background:var(--gray2);border-radius:2px;overflow:hidden;margin:8px 0}
.progf{height:100%;border-radius:2px}
.ef-box{background:var(--gray);border-radius:var(--rs);padding:14px 16px;margin-top:8px}
.ef-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);padding:3px 0}

/* PHASE TABS */
.ptabs{display:flex;gap:8px;margin-bottom:14px}
.ptab{flex:1;padding:10px 6px;border-radius:var(--rs);border:1.5px solid var(--gray2);background:var(--white);cursor:pointer;text-align:center;font-size:12px;font-weight:600;color:var(--muted);font-family:var(--font-body);transition:all .15s}
.ptab.act{border-color:var(--black);background:var(--black);color:var(--white)}

/* DB */
.db-cat{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:10px 16px 6px;border-bottom:1px solid var(--gray2);background:var(--gray)}
.db-ing{padding:12px 16px;border-bottom:1px solid var(--gray2);display:flex;justify-content:space-between;align-items:center;background:var(--white)}
.db-ing:last-child{border-bottom:none}
.db-ing .din{font-size:13px;font-weight:500;color:var(--offblack)}
.db-ing .dsp{font-size:11px;color:var(--muted);margin-top:1px}
.db-new{font-size:10px;background:var(--lime);color:var(--offblack);padding:2px 7px;border-radius:var(--rb);font-weight:600;margin-left:6px}

/* MODAL */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:flex-end;justify-content:center}
.modal-box{background:var(--white);border-radius:var(--r) var(--r) 0 0;padding:32px 24px 44px;width:100%;max-width:430px;text-align:center;position:relative;z-index:10000}
.modal-box .mico{font-size:36px;margin-bottom:12px}
.modal-box h3{font-family:var(--font-display);font-size:22px;margin-bottom:6px;color:var(--offblack)}
.modal-box p{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6}
.modal-btns{display:flex;flex-direction:column-reverse;gap:10px}
.mbtn-cancel{padding:14px;border-radius:var(--rb);border:1.5px solid var(--gray2);background:var(--white);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font-body);color:var(--offblack);width:100%}
.mbtn-ok{padding:14px;border-radius:var(--rb);border:none;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font-body);color:#FFFFFF;background:#0A0A0A;width:100%}

/* TOAST */
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--offblack);color:var(--white);padding:11px 20px;border-radius:var(--rb);font-size:13px;font-weight:500;z-index:9998;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* OVERVIEW TITLE */
.ov-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ov-title{font-size:16px;font-weight:600;color:var(--offblack)}
.ov-grid-btn{width:32px;height:32px;background:var(--black);border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer}

.photo-zone{width:100%}
.photo-thumbs{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-start}
.photo-thumb{position:relative;width:80px;height:80px;border-radius:10px;overflow:hidden;border:1.5px solid var(--gray2);flex-shrink:0}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-del{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.6);color:white;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
.photo-add-btn{width:80px;height:80px;border-radius:10px;border:1.5px dashed var(--gray3);background:var(--gray);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:4px;flex-shrink:0}
.photo-add-btn span:last-child{font-size:10px;color:var(--muted);font-weight:500}

.ing-table{width:100%;border-collapse:collapse;margin-top:8px}
.ing-table th{font-size:11px;font-weight:600;color:var(--muted);text-align:left;padding:6px 8px;border-bottom:1.5px solid var(--gray2);text-transform:uppercase;letter-spacing:.05em}
.ing-table td{font-size:13px;padding:9px 8px;border-bottom:1px solid var(--gray2);color:var(--offblack);vertical-align:middle}
.ing-table tr:last-child td{border-bottom:none}
.ing-table tr:hover td{background:var(--gray)}
.ing-table input{border:none;background:transparent;font-size:13px;font-family:var(--font-body);color:var(--offblack);width:100%;outline:none;min-width:0}
.ing-table select{border:none;background:transparent;font-size:12px;font-family:var(--font-body);color:var(--muted);outline:none;-webkit-appearance:none;cursor:pointer;width:100%}
.ing-table .del-ing-row{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 4px;font-family:inherit}
.ing-table .del-ing-row:hover{color:var(--rd-d)}
.add-ing-row{display:flex;align-items:center;gap:8px;padding:8px 0 2px;cursor:pointer;font-size:12px;color:var(--muted);font-weight:500;border:none;background:none;font-family:var(--font-body);width:100%}
.add-ing-row:hover{color:var(--offblack)}
.ing-search-wrap{position:relative;margin-bottom:8px}
.ing-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--white);border:1.5px solid var(--gray2);border-radius:var(--rs);z-index:50;max-height:200px;overflow-y:auto;box-shadow:0 4px 20px rgba(0,0,0,.1)}

const SHEET_URL = 'https://script.google.com/macros/s/AKfycby2iVwiSskGobmWgFtUjG5YJFf8CuHRuojzGgzgRxmyrc52TfDALfqS3OXITvHOHpam/exec';
let SHEETS_READY = false;

async function sheetSave(sheetName, rowData) {
  try {
    await fetch(SHEET_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({action:'append', sheet:sheetName, row:rowData})
    });
  } catch(e) {
    console.warn('Sheets save failed:', e);
  }
}

async function sheetLoad(sheetName) {
  try {
    const res = await fetch(SHEET_URL + '?sheet=' + encodeURIComponent(sheetName));
    const json = await res.json();
    return json.ok ? json.data : [];
  } catch(e) {
    console.warn('Sheets load failed:', e);
    return [];
  }
}

async function loadAllFromSheets() {
  toast('🔄 Loading data from Google Sheets...');

    const [src, trp, wst, cmp, eng, csr, rec] = await Promise.all([

      sheetLoad('4_Compost'),
      sheetLoad('6_Energy'),
      sheetLoad('7_CSR'),
      sheetLoad('8_Recipes'),

      ts:Date.now(), date:r['Date (Thai)']||today(),
      ingredient:r['Ingredient'], supplier:r['Supplier'],
      province:r['Province / Origin'], srctype:r['Source Type'],

// แก้รหัสผ่านได้ที่ Google Sheet → Sheet ชื่อ "Passwords" คอลัมน์ Role / Password
let PASSWORDS = {
  fluke:  'Goat@2025',
  yok:    'Goat@2025',
  peter:  'Goat@2025',
  pastry: 'Goat@2025',
  mixo:   'Goat@2025',
  joy:    'Goat@2025',
  owner:  'Goat@2025',
  staff:  'Goat@2025',
};

async function loadPasswordsFromSheet(){
  try {
    const res = await fetch(SHEET_URL + '?sheet=' + encodeURIComponent('Passwords'));
    const json = await res.json();
    if(json.ok && json.data){
      json.data.forEach(row => {
        const role = (row['Role']||'').toLowerCase().trim();
        const pw   = (row['Password']||'').trim();
        if(role && pw) PASSWORDS[role] = pw;
      });
    }
  } catch(e){
    // ใช้ default password ถ้าโหลดไม่ได้
    console.warn('Could not load passwords from Sheets, using defaults');
  }
}
function today(){const d=new Date();return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()+543}`;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function checkPassword(){
  const pw=document.getElementById('pw-input')?.value;
  const correct=PASSWORDS[S.role];
  const errEl=document.getElementById('pw-error');
  if(pw===correct){
    if(errEl) errEl.textContent='';
    document.getElementById('lbtn').disabled=false;
  } else {
    document.getElementById('lbtn').disabled=true;
    if(errEl&&pw.length>0) errEl.textContent='❌ Incorrect password';
    else if(errEl) errEl.textContent='';
  }

// ── INGREDIENT 2-MODE SYSTEM ─────────────────────────────────────────────
let SI_MODE = 'search'; // 'search' | 'new'

function si_setMode(mode){
  SI_MODE = mode;
  const sp = document.getElementById('si-search-panel');
  const np = document.getElementById('si-new-panel');
  const bs = document.getElementById('si-mode-search');
  const bn = document.getElementById('si-mode-new');
  if(mode === 'search'){
    if(sp) sp.style.display = 'block';
    if(np) np.style.display = 'none';
    if(bs){ bs.style.background='#0A0A0A'; bs.style.color='#fff'; bs.style.borderColor='#0A0A0A'; }
    if(bn){ bn.style.background='var(--white)'; bn.style.color='var(--muted)'; bn.style.borderColor='var(--gray2)'; }
    document.getElementById('si-ing-search')?.focus();
  } else {
    if(sp) sp.style.display = 'none';
    if(np) np.style.display = 'block';
    if(bn){ bn.style.background='#0A0A0A'; bn.style.color='#fff'; bn.style.borderColor='#0A0A0A'; }
    if(bs){ bs.style.background='var(--white)'; bs.style.color='var(--muted)'; bs.style.borderColor='var(--gray2)'; }
    document.getElementById('si-new-name')?.focus();
  }
}

function si_filterSearch(q){
  const res = document.getElementById('si-search-results');
  const sel = document.getElementById('si-selected-ing');
  if(!res) return;
  if(!q || q.length < 1){ res.style.display='none'; return; }
  const results = DB.filter(i => i.n.toLowerCase().includes(q.toLowerCase())).slice(0,25);
  if(!results.length){ res.innerHTML='<div style="padding:12px;color:var(--hint);font-size:12px;text-align:center">No results — switch to "+ New" to add</div>'; res.style.display='block'; return; }
  res.innerHTML = '';
  results.forEach(item => {
    const div = document.createElement('div');
    div.style.cssText = 'padding:10px 13px;cursor:pointer;border-bottom:1px solid var(--gray2);font-size:13px;display:flex;justify-content:space-between;align-items:center';
    div.innerHTML = '<span style="font-weight:500">'+esc(item.n)+'</span><span style="font-size:11px;color:var(--muted)">'+esc(item.c)+(item.s?' · '+esc(item.s):'')+'</span>';
    div.addEventListener('mousedown', e => {
      e.preventDefault();
      si_selectIng(item.n, item.s);
    });
    div.addEventListener('mouseover', ()=>{ div.style.background='var(--gray)'; });
    div.addEventListener('mouseout', ()=>{ div.style.background=''; });
    res.appendChild(div);
  });
  res.style.display = 'block';
}

function si_selectIng(name, province){
  // Set hidden value
  const inp = document.getElementById('si-ing');
  if(inp) inp.value = name;
  // Show selected chip
  const sel = document.getElementById('si-selected-ing');
  const nm = document.getElementById('si-selected-name');
  if(sel){ sel.style.display='flex'; }
  if(nm) nm.textContent = name;
  // Hide results & clear search
  const res = document.getElementById('si-search-results');
  if(res) res.style.display = 'none';
  const srch = document.getElementById('si-ing-search');
  if(srch) srch.value = '';
  // Auto-fill province
  if(province){
    const prov = document.getElementById('si-province');
    if(prov && !prov.value) prov.value = province;
  }
}

function si_clearIng(){
  const inp = document.getElementById('si-ing');
  if(inp) inp.value = '';
  const sel = document.getElementById('si-selected-ing');
  if(sel) sel.style.display = 'none';
  const srch = document.getElementById('si-ing-search');
  if(srch){ srch.value = ''; srch.focus(); }
}

function si_saveNewIng(){
  const nameEl = document.getElementById('si-new-name');
  const name = nameEl?.value.trim();
  if(!name){ toast('⚠ Enter ingredient name'); return; }
  const note = document.getElementById('si-new-note');
  if(DB.find(i => i.n.toLowerCase() === name.toLowerCase())){
    // Already exists — just select it
    si_selectIng(name, '');
    si_setMode('search');
    if(note) note.textContent = '';
    if(nameEl) nameEl.value = '';
    toast('✓ Found in database — selected');
    return;
  }
  const cat = document.getElementById('si-new-cat')?.value || 'Other';
  DB.push({n:name, c:cat, s:'', sp:'', isNew:true});
  si_selectIng(name, '');
  si_setMode('search');
  if(note) note.textContent = '';
  if(nameEl) nameEl.value = '';
  toast('✓ "'+name+'" added to database & selected');
}

function saveSourcing(){

  const entry={ts:Date.now(),date:today(),ingredient:ing,
    supplier:document.getElementById('si-sup')?.value,
    province:document.getElementById('si-province')?.value,
    srctype:document.getElementById('si-type')?.value,
    course:document.getElementById('si-course')?.value,
    ref:document.getElementById('si-ref')?.value,

function srcDel(btn){
  const idx=parseInt(btn.getAttribute('data-si'));
  LOGS.sourcing.splice(idx,1);
  const pg=S.page;
  navigate(pg);
  toast('✓ Record deleted');
}
function sourcingHistory(){
  if(!LOGS.sourcing.length) return '<div style="padding:10px 0;color:var(--hint);font-size:12px;text-align:center">No sourcing records yet.</div>';
  return LOGS.sourcing.slice().reverse().slice(0,10).map((r,i)=>{
    const idx = LOGS.sourcing.length-1-i;
    return `<div class="ec" style="margin-bottom:7px">
      <div class="et">
        <span class="etitle">${esc(r.ingredient||'—')}</span>
        <span class="edate">${r.date}</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;align-items:center">
        ${r.supplier?`<span class="pill gn">${esc(r.supplier)}</span>`:''}
        ${r.province?`<span class="pill bl">${esc(r.province)}</span>`:''}
        ${r.course?`<span class="pill am" style="background:#FEF3C7;color:#451A03">${esc(r.course)}</span>`:''}
      </div>
      ${r.note?`<div style="font-size:11px;color:var(--muted);margin-top:3px;font-style:italic">${esc(r.note)}</div>`:''}
      <button class="edel" onclick="delLog('sourcing',${idx},this)">×</button>
    </div>`;
  }).join('');
}

  // Summary KPIs

    html += '<div style="text-align:center;padding:40px;color:var(--hint)">No sourcing records yet.</div>';

    Object.entries(byDate).forEach(([date, records])=>{
      html += '<div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:10px 0 5px">'+date+'</div>';
      records.forEach((r,i)=>{
        const idx = LOGS.sourcing.indexOf(r);
        html += '<div class="ec" style="margin-bottom:7px">'
          + '<div class="et"><span class="etitle">'+esc(r.ingredient||'—')+'</span>'

          + (r.province?'<span class="pill bl">'+esc(r.province)+'</span>':'')

          + '</div>'
          + (r.note?'<div style="font-size:11px;color:var(--muted);margin-top:3px;font-style:italic">'+esc(r.note)+'</div>':'')
          + '<button class="edel" data-si="'+idx+'" onclick="srcDel(this)">×</button>'

  html += '</div>';

function calcUsageWaste(){
  const total=parseFloat(document.getElementById('u-total')?.value)||0;
  const used=parseFloat(document.getElementById('u-used')?.value)||0;
  const left=parseFloat(document.getElementById('u-left')?.value)||0;
  const waste=Math.max(0,total-used-left);
  const pct=total>0?(waste/total*100):0;
  const wg=document.getElementById('u-waste-g');
  const wp=document.getElementById('u-waste-pct');
  if(wg)wg.textContent=total>0?`${waste.toFixed(0)} g.`:'—';
  if(wp)wp.textContent=total>0?`${pct.toFixed(1)}%`:'—';
}
function usageLog(){
  if(!LOGS.usage?.length)return`<div style="padding:12px 0;color:var(--hint);font-size:12px">No usage logs yet.</div>`;
  // Group by ingredient
  const grouped={};
  LOGS.usage.forEach((r,idx)=>{
    const key=r.ingredient||'—';
    if(!grouped[key]) grouped[key]={entries:[],totalG:0,usedG:0,wasteG:0};
    grouped[key].entries.push({...r,_idx:idx});
    grouped[key].totalG+=(r.total||0);
    grouped[key].usedG+=(r.used||0);
    grouped[key].wasteG+=(r.wasteG||0);
  });
  return Object.entries(grouped).map(([ing,g])=>{
    const wastePct=g.totalG>0?((g.wasteG/g.totalG)*100).toFixed(1):0;
    const wasteClass=wastePct>30?'rd':wastePct>10?'or':'gn';
    return `<div class="ec" style="margin-bottom:8px">

// ── MULTI-PHOTO COMPONENT ────────────────────────────────────────────────
let PHOTO_STORE = {}; // {formKey: [{name,dataUrl}]}
function initPhotos(key){
  if(!PHOTO_STORE[key])PHOTO_STORE[key]=[];
}
function renderPhotoZone(key){
  initPhotos(key);
  const photos=PHOTO_STORE[key];
  return `<div class="photo-zone" id="pz-${key}">
    <div class="photo-thumbs" id="pt-${key}">
      ${photos.map((p,i)=>`
        <div class="photo-thumb">
          <img src="${p.dataUrl}" alt="${p.name}"/>
          <button class="photo-del" onclick="removePhoto('${key}',${i})">×</button>
        </div>`).join('')}
      <label class="photo-add-btn">
        <input type="file" accept="image/*" multiple onchange="addPhotos('${key}',this)" style="display:none"/>
        <span style="font-size:22px">📷</span>
        <span>Add photo</span>
      </label>
    </div>
  </div>`;
}
function addPhotos(key,input){
  const files=Array.from(input.files);
  initPhotos(key);
  files.forEach(f=>{
    const reader=new FileReader();
    reader.onload=e=>{
      PHOTO_STORE[key].push({name:f.name,dataUrl:e.target.result});
      const pt=document.getElementById(`pt-${key}`);
      if(pt){
        const pz=document.getElementById(`pz-${key}`);
        if(pz)pz.outerHTML=renderPhotoZone(key);
        // re-attach because we replaced DOM
        const newPz=document.getElementById(`pz-${key}`);
      }
      // Re-render thumbs
      const thumbsEl=document.getElementById(`pt-${key}`);
      if(thumbsEl){
        const photos=PHOTO_STORE[key];
        thumbsEl.innerHTML=photos.map((p,i)=>`
          <div class="photo-thumb">
            <img src="${p.dataUrl}" alt="${p.name}"/>
            <button class="photo-del" onclick="removePhoto('${key}',${i})">×</button>
          </div>`).join('')+`
          <label class="photo-add-btn">
            <input type="file" accept="image/*" multiple onchange="addPhotos('${key}',this)" style="display:none"/>
            <span style="font-size:22px">📷</span>
            <span>Add photo</span>
          </label>`;
      }
    };
    reader.readAsDataURL(f);
  });
  input.value='';
}
function removePhoto(key,idx){
  if(PHOTO_STORE[key])PHOTO_STORE[key].splice(idx,1);
  const thumbsEl=document.getElementById(`pt-${key}`);
  if(thumbsEl){
    const photos=PHOTO_STORE[key];
    thumbsEl.innerHTML=photos.map((p,i)=>`
      <div class="photo-thumb">
        <img src="${p.dataUrl}" alt="${p.name}"/>
        <button class="photo-del" onclick="removePhoto('${key}',${i})">×</button>
      </div>`).join('')+`
      <label class="photo-add-btn">
        <input type="file" accept="image/*" multiple onchange="addPhotos('${key}',this)" style="display:none"/>
        <span style="font-size:22px">📷</span>
        <span>Add photo</span>
      </label>`;
  }
}

function saveUsage(){
  const ing=document.getElementById('u-ing')?.value;
  if(!ing){toast('⚠ Select an ingredient');return;}
  const total=parseFloat(document.getElementById('u-total')?.value)||0;
  const used=parseFloat(document.getElementById('u-used')?.value)||0;
  const left=parseFloat(document.getElementById('u-left')?.value)||0;
  const waste=Math.max(0,total-used-left);
  const pct=total>0?+(waste/total*100).toFixed(1):0;
  if(!LOGS.usage)LOGS.usage=[];
  const uEntry={ts:Date.now(),date:today(),ingredient:ing,
    category:document.getElementById('u-cat')?.value,
    dish:document.getElementById('u-dish')?.value,
    tech:document.getElementById('u-tech')?.value,
    partUsed:document.getElementById('u-part')?.value,
    total,used,leftover:left,wasteG:waste,wastePct:pct,
    reuse:document.getElementById('u-reuse')?.value,
    note:document.getElementById('u-note')?.value};
  LOGS.usage.push(uEntry);
  sheetSave('5_Usage',[uEntry.date,uEntry.ingredient,uEntry.category,uEntry.dish,uEntry.tech,uEntry.partUsed,uEntry.total,uEntry.used,uEntry.leftover,uEntry.wasteG,uEntry.wastePct,uEntry.reuse,uEntry.note,S.role]);

}

function calcCO2(){
  const d=parseFloat(document.getElementById('tr-dist')?.value)||0;
  const t=parseFloat(document.getElementById('tr-trips')?.value)||1;
  const v=document.getElementById('tr-veh')?.value||'Pickup';
  const f=document.getElementById('tr-fuel')?.value||'Diesel';
  const k=`${v}-${f}`;
  const ef=TEF[k]||0.173;
  const tot=d*t;const co2=tot*ef;
  const tkm=document.getElementById('tr-totalkm');
  const tco=document.getElementById('tr-co2');
  if(tkm)tkm.textContent=tot>0?`${tot.toFixed(1)} km`:'—';
  if(tco)tco.textContent=co2>0?`${co2.toFixed(3)} kg  (EF: ${ef} kg/km)`:'—';
}
function transportLog(){
  if(!LOGS.transport.length)return`<div style="padding:12px 0;color:var(--hint);font-size:12px">No trips logged yet.</div>`;
  return LOGS.transport.slice().reverse().slice(0,5).map((r,i)=>`
    <div class="ec">
      <div class="et"><span class="etitle">${esc(r.supplier||'Unknown')}</span><span class="edate">${r.date}</span></div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:3px">
        <span class="esub">${r.vehicle} · ${r.totalKm} km · ${(r.co2e||0).toFixed(3)} kg CO₂e</span>
        <span class="pill or">S2</span>
      </div>
      <button class="edel" onclick="delLog('transport',${LOGS.transport.length-1-i},this)">×</button>
    </div>`).join('');
}
function saveTransport(){
  const d=parseFloat(document.getElementById('tr-dist')?.value);
  if(!d){toast('⚠ Enter distance');return;}
  const v=document.getElementById('tr-veh')?.value||'Pickup';
  const f=document.getElementById('tr-fuel')?.value||'Diesel';
  const t=parseFloat(document.getElementById('tr-trips')?.value)||1;
  const ef=TEF[`${v}-${f}`]||0.173;
  const entry={ts:Date.now(),date:today(),
    ref:document.getElementById('tr-ref')?.value,
    supplier:document.getElementById('tr-sup')?.value,
    direction:document.getElementById('tr-dir')?.value,
    vehicle:v,fuel:f,distance:d,trips:t,
    totalKm:+(d*t).toFixed(2),co2e:+(d*t*ef).toFixed(4),
    cargo:document.getElementById('tr-cargo')?.value,
    note:document.getElementById('tr-note')?.value};
  LOGS.transport.push(entry);

  toast(`✓ Transport logged · CO₂e: ${(d*t*ef).toFixed(3)} kg`);
  setTimeout(()=>navigate('transport'),1900);
}

function pickWasteAction(btn){
  const id = typeof btn === 'string' ? btn : btn.getAttribute('data-waction');
  S_WASTE_ACTION = id;
  renderWaste(document.getElementById('mc'));

}

function wasteLog(){
  if(!LOGS.waste.length)return'<div style="padding:12px 0;color:var(--hint);font-size:12px">No waste logged yet.</div>';
  return LOGS.waste.slice().reverse().slice(0,8).map((r,i)=>{
    const idx = LOGS.waste.length-1-i;
    const actionLabel = WASTE_ACTIONS.find(a=>a.id===r.action)?.label || r.disposal || '—';
    const pillColor = WASTE_ACTIONS.find(a=>a.id===r.action)?.color || 'te';
    return `<div class="ec">
      <div class="et"><span class="etitle">${esc(r.wasteType)}</span><span class="edate">${r.date}</span></div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap">
        <span class="esub">${r.weight} kg</span>
        <span class="pill ${pillColor}">${actionLabel}</span>
        <span class="pill te">${esc(r.category)}</span>
      </div>
      ${r.note?`<div style="font-size:11px;color:var(--muted);margin-top:4px;font-style:italic">${esc(r.note)}</div>`:''}
      ${r.action==='compost'&&r.compostBatch?`<div style="font-size:11px;color:#16A34A;margin-top:3px">🌱 Linked to Batch ${esc(r.compostBatch)}</div>`:''}
      <button class="edel" onclick="delLog('waste',${idx},this)">×</button>
    </div>`;
  }).join('');
}

function wasteDel(btn){
  const idx=parseInt(btn.getAttribute('data-di'));
  delLog('waste',idx,btn);
}
function pickWasteCatTag(el){
  const cat = el.getAttribute('data-cat');
  S.wasteCat = cat;
  el.closest('.tpick').querySelectorAll('.tag').forEach(t=>t.classList.remove('act'));
  el.classList.add('act');
}
function pickWasteCat(el,cat){
  S.wasteCat=cat;
  el.closest('.tpick').querySelectorAll('.tag').forEach(t=>t.classList.remove('act'));
  el.classList.add('act');
}

function saveWaste(){
  const w=parseFloat(document.getElementById('w-wt')?.value);
  if(!w){toast('⚠ Enter weight');return;}
  const note = document.getElementById('w-note')?.value||'';
  const action = S_WASTE_ACTION;

  // Handle compost linking
  let compostBatch = '';
  if(action==='compost'){
    const sel = document.querySelector('input[name="comp-batch"]:checked');
    const batchVal = sel ? sel.value : '__new__';
    if(batchVal==='__new__'){
      // Auto-create a new compost batch
      if(!LOGS.compost) LOGS.compost=[];
      const wType = document.getElementById('w-type')?.value||'';
      const newBatch = 'W-'+Date.now().toString(36).slice(-4).toUpperCase();
      LOGS.compost.push({
        ts:Date.now(), date:today(), batch:newBatch,
        material:wType, inputKg:w, ratio:'Not measured',
        note:'Auto-created from Waste Log — '+note,
        status:'input'
      });
      compostBatch = newBatch;
      toast('✓ Waste logged + Compost Batch '+newBatch+' created');
    } else {
      compostBatch = batchVal;
      // Add weight to existing batch note
      const existing = (LOGS.compost||[]).find(b=>b.batch===batchVal);
      if(existing) existing.note = (existing.note?existing.note+', ':'')+'Added '+w+'kg on '+today();
      toast('✓ Waste logged + added to Batch '+batchVal);
    }
  } else {
    toast('✓ Waste logged: '+w+' kg');
  }

  const wEntry={ts:Date.now(),date:today(),
    wasteType:document.getElementById('w-type')?.value,
    weight:w,action:action,
    disposal:WASTE_ACTIONS.find(a=>a.id===action)?.en||action,
    category:S.wasteCat,note:note,compostBatch:compostBatch};
  LOGS.waste.push(wEntry);
  sheetSave('3_Waste',[wEntry.date,wEntry.wasteType,wEntry.weight,wEntry.category,wEntry.disposal,wEntry.compostBatch,wEntry.note,S.role]);
  S_WASTE_ACTION='throw';
  setTimeout(()=>navigate('waste'),1900);
}

function selectBatch(i){
  _selectedBatchIdx = i;
  document.querySelectorAll('[id^="harvest-sel-"]').forEach((el,j)=>{
    el.style.borderColor = j===i ? '#16A34A' : 'transparent';
  });
  const active=(LOGS.compost||[]).filter(b=>b.status==='input');
  const b=active[i];
  const dispEl=document.getElementById('ch-in-display');
  if(dispEl) dispEl.textContent=b.inputKg+' kg';
  window._harvestInputKg = b.inputKg;
  const form=document.getElementById('harvest-form');
  const photo=document.getElementById('harvest-photo');
  const btn=document.getElementById('harvest-btn');
  if(form) form.style.display='block';
  if(photo) photo.style.display='block';
  if(btn) btn.style.display='block';
}
let _selectedBatchIdx = -1;
function delCompostBatch(batchNum){
  showModal('🗑','Delete batch?','Batch '+batchNum+' will be removed.','Delete','#7F1D1D',()=>{
    LOGS.compost=(LOGS.compost||[]).filter(b=>b.batch!==batchNum);
    navigate('compost');
    toast('✓ Batch '+batchNum+' deleted');
  });
}
function saveCompostInput(){
  const batch=document.getElementById('cp-batch')?.value.trim();
  if(!batch){toast('⚠ Enter batch number');return;}
  const kg=parseFloat(document.getElementById('cp-in')?.value)||0;
  if(!kg){toast('⚠ Enter input weight');return;}
  if(!LOGS.compost) LOGS.compost=[];
  // Store photos under batch-specific key
  if((PHOTO_STORE['compost1']||[]).length){
    PHOTO_STORE['compost1_'+batch]=PHOTO_STORE['compost1']||[];
    PHOTO_STORE['compost1']=[];
  }
  const cpEntry={ts:Date.now(),date:today(),batch:batch,
    material:document.getElementById('cp-mat')?.value||'',
    inputKg:kg,ratio:document.getElementById('cp-cn')?.value||'',
    note:document.getElementById('cp-note')?.value||'',status:'input'};
  LOGS.compost.push(cpEntry);
  sheetSave('4_Compost',[cpEntry.batch,cpEntry.date,'input',cpEntry.material,cpEntry.inputKg,cpEntry.ratio,cpEntry.note,'','','','','',S.role]);
  toast('✓ Batch '+batch+' saved — go to Harvest when ready');
  setTimeout(()=>{S.phase=1;navigate('compost');},1800);
}
function saveCompostHarvest(){
  if(_selectedBatchIdx<0){toast('⚠ Select a batch first');return;}
  const out=parseFloat(document.getElementById('ch-out')?.value)||0;
  if(!out){toast('⚠ Enter output weight');return;}
  const active=(LOGS.compost||[]).filter(b=>b.status==='input');
  const b=active[_selectedBatchIdx];
  const pct=b.inputKg>0?+((1-out/b.inputKg)*100).toFixed(1):0;
  b.status='harvested';
  b.outputKg=out;
  b.harvestDate=today();
  b.reduction=pct;
  b.usedAt=document.getElementById('ch-dest')?.value||'';
  // Store harvest photos under batch key
  if((PHOTO_STORE['compost3']||[]).length){
    PHOTO_STORE['compost3_'+b.batch]=PHOTO_STORE['compost3']||[];
    PHOTO_STORE['compost3']=[];
  }
  _selectedBatchIdx=-1;
  toast('✓ Harvest complete · '+pct+'% reduction');
  setTimeout(()=>{S.phase=4;navigate('compost');},1800);
}


function calcRed(){
  const inp=parseFloat(document.getElementById('ch-in')?.value)||(window._harvestInputKg||0);
  const out=parseFloat(document.getElementById('ch-out')?.value)||0;
  const el=document.getElementById('ch-red');
  if(el&&inp>0)el.textContent=`${((1-out/inp)*100).toFixed(1)}%  (${inp} kg → ${out} kg)`;
}

function calcEnergyCO2(){
  const e=parseFloat(document.getElementById('en-e')?.value)||0;
  const w=parseFloat(document.getElementById('en-w')?.value)||0;
  const g=parseFloat(document.getElementById('en-g')?.value)||0;
  const f=parseFloat(document.getElementById('en-f')?.value)||0;
  const ce=e*EF.elec,cw=w*EF.water,cg=g*EF.lpg,cf=f*EF.diesel,tot=ce+cw+cg+cf;
  const s=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v>0?`${v.toFixed(2)} kg CO₂e`:'—';};
  s('en-co2e',ce);s('en-co2w',cw);s('en-co2g',cg);s('en-co2f',cf);
  const t=document.getElementById('en-total');
  if(t)t.textContent=tot>0?`${tot.toFixed(2)} kg  (${(tot/1000).toFixed(4)} ton CO₂e)`:'—';
}
function energyLog(){
  if(!LOGS.energy.length)return`<div style="padding:12px 0;color:var(--hint);font-size:12px">No energy records yet.</div>`;
  return LOGS.energy.slice().reverse().slice(0,3).map((r,i)=>`
    <div class="ec">
      <div class="et"><span class="etitle">${esc(r.month)}</span><span class="edate">${r.date}</span></div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:3px">
        <span class="esub">Elec: ${r.elec||0} kWh · Gas: ${r.gas||0} kg · Water: ${r.water||0} u</span>
        <span class="pill bl">S4</span>
      </div>
      <button class="edel" onclick="delLog('energy',${LOGS.energy.length-1-i},this)">×</button>
    </div>`).join('');
}
function saveEnergy(){
  const enEntry={ts:Date.now(),date:today(),

// Sheet name map for each log key
const LOG_SHEET_MAP = {
  sourcing:'1_Sourcing', transport:'2_Transport', waste:'3_Waste',
  compost:'4_Compost', usage:'5_Usage', energy:'6_Energy', csr:'7_CSR'
};
const LOG_FALLBACK_COL = {
  sourcing:2, transport:3, waste:2, compost:0, usage:2, energy:0, csr:2
};
const LOG_FALLBACK_FIELD = {
  sourcing:'ingredient', transport:'supplier', waste:'wasteType',
  compost:'batch', usage:'ingredient', energy:'month', csr:'title'
};

function delLog(key,idx,btn){
  showModal('🗑','Delete entry?','This cannot be undone.','Delete','var(--rd-d)',()=>{
    const arr = key==='recipes' ? RECIPES : (LOGS[key]||[]);
    const record = arr[idx];
    arr.splice(idx,1);
    if(btn && btn.closest) btn.closest('.ec')?.remove();
    toast('✓ Entry deleted');
    if(record && LOG_SHEET_MAP[key]){
      const fallbackField = LOG_FALLBACK_FIELD[key];
      const fallbackCol = LOG_FALLBACK_COL[key];
      fetch(SHEET_URL, {
        method:'POST', mode:'no-cors',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          action:'delete',
          sheet:LOG_SHEET_MAP[key],
          ts: String(record.ts||''),
          fallback: fallbackField ? String(record[fallbackField]||'') : '',
          matchCol: fallbackCol||2
        })
      }).catch(()=>{});
    }
  });
}

// ── REPORT PERIOD FILTER ─────────────────────────────────────────────────
function repFilterBar(el){
  const periods=['all','today','week','month','year'];
  const labels=['All Time','Today','This Week','This Month','This Year'];
  const bar=document.createElement('div');
  bar.style.cssText='display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px';
  periods.forEach((p,i)=>{
    const btn=document.createElement('button');
    btn.textContent=labels[i];
    btn.className='ftab'+(S.repPeriod===p?' active':'');
    btn.style.cssText='font-size:12px;padding:7px 13px';
    btn.onclick=()=>{
      S.repPeriod=p;
      const page=S.page;
      navigate(page);
    };
    bar.appendChild(btn);
  });
  el.prepend(bar);
}
function filterRep(arr){
  if(!arr||!arr.length)return[];
  const now=new Date();
  const p=S.repPeriod||'all';
  if(p==='all')return arr;
  return arr.filter(r=>{
    if(!r.ts)return p==='all';
    const d=new Date(r.ts);
    if(p==='today') return d.toDateString()===now.toDateString();
    if(p==='week'){const w=new Date(now); w.setDate(w.getDate()-7); return d>=w;}
    if(p==='month') return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(p==='year') return d.getFullYear()===now.getFullYear();
    return true;
  });
}

// ── ROLE-BASED KPI CARDS ─────────────────────────────────────────────────
function kpiCard(cls, label, value, unit, dark=false){
  return `<div class="kpi-card ${cls}">
    <div class="kl${dark?' dark':''}">${label}</div>
    <div><div class="kv"${dark?' style="color:var(--offblack)"':''}>${value}</div><div class="ku"${dark?' style="color:var(--muted)"':''}>${unit}</div></div>
  </div>`;
}
function renderKPIs(role,fSrc,fTrp,fWst,fRec,scope3,wt){
  const myRec=fRec.filter(r=>r.role===role);
  const allRec=fRec.length;
  const co2=scope3>=1000?(scope3/1000).toFixed(2):scope3.toFixed(1);
  const co2u=scope3>=1000?'ton':'kg CO₂e';
  switch(role){
    case 'fluke':
      return kpiCard('kpi1','Sourcing logged',fSrc.length,'items')
            +kpiCard('kpi2','Ingredient usage',(LOGS.usage||[]).length,'records')
            +kpiCard('kpi3','My Recipes',myRec.length,'saved',true)
            +kpiCard('kpi4','R&D Library',RECIPES.length,'total');
    case 'yok':
    case 'staff':
      return kpiCard('kpi1','Transport trips',fTrp.length,'trips')
            +kpiCard('kpi2','Waste logged',wt.toFixed(1),'kg')
            +kpiCard('kpi3','Transport CO₂e',co2,co2u,true)
            +kpiCard('kpi4','My Recipes',myRec.length,'saved');
    case 'peter':
      return kpiCard('kpi1','My R&D',myRec.length,'recipes')
            +kpiCard('kpi2','Approved',myRec.filter(r=>r.status&&r.status.includes('Approved')).length,'items')
            +kpiCard('kpi3','Ingredients',DB.length,'in DB',true)
            +kpiCard('kpi4','Techniques',[...new Set(myRec.map(r=>r.tech).filter(Boolean))].length,'used');
    case 'pastry':
      return kpiCard('kpi1','My Pastry R&D',myRec.length,'recipes')
            +kpiCard('kpi2','Approved',myRec.filter(r=>r.status&&r.status.includes('Approved')).length,'items')
            +kpiCard('kpi3','On Menu',myRec.filter(r=>r.status==='On Menu').length,'dishes',true)
            +kpiCard('kpi4','Ingredients',DB.length,'in DB');
    case 'mixo':
      return kpiCard('kpi1','My Bar R&D',myRec.length,'recipes')
            +kpiCard('kpi2','Approved',myRec.filter(r=>r.status&&r.status.includes('Approved')).length,'items')
            +kpiCard('kpi3','On Menu',myRec.filter(r=>r.status==='On Menu').length,'drinks',true)
            +kpiCard('kpi4','Ingredients',DB.length,'in DB');
    case 'joy':
      return kpiCard('kpi1','Energy records',LOGS.energy.length,'months')
            +kpiCard('kpi2','CSR activities',LOGS.csr.length,'logged')
            +kpiCard('kpi3','Carbon Scope 3',co2,co2u,true)
            +kpiCard('kpi4','Transport trips',fTrp.length,'trips');
    default:
      return kpiCard('kpi1','Sourcing',fSrc.length,'items')
            +kpiCard('kpi2','Waste',wt.toFixed(1),'kg')
            +kpiCard('kpi3','CO₂e',co2,co2u,true)
            +kpiCard('kpi4','Recipes',allRec,'total');
  }
}
